<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Tap 4 Proxies</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"><style>:root{--bg:#0e0e10;--sur:#17171a;--sur2:#1f1f24;--bor:#2e2e36;--acc:#c9a84c;--acc2:#e8c97a;--txt:#e8e6e0;--mut:#7a7870;--cw:200px}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;border-bottom:1px solid var(--bor);background:var(--sur);position:sticky;top:0;z-index:100}.logo{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--acc)}.logo span{color:var(--txt);font-weight:400}#bb{display:flex;align-items:center;gap:8px;background:var(--sur2);border:1px solid var(--bor);color:var(--txt);font-size:14px;padding:8px 16px;border-radius:8px;cursor:pointer}#bb:hover{border-color:var(--acc)}.bc{background:var(--acc);color:#0e0e10;font-size:11px;border-radius:12px;padding:1px 7px}.layout{display:flex;min-height:calc(100vh - 61px)}aside{width:230px;flex-shrink:0;background:var(--sur);border-right:1px solid var(--bor);padding:20px;overflow-y:auto;position:sticky;top:61px;height:calc(100vh - 61px)}.sl{font-size:10px;letter-spacing:.14em;color:var(--mut);text-transform:uppercase;margin-bottom:8px;font-family:'Cinzel',serif}.ss{margin-bottom:24px}#search{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:8px;color:var(--txt);font-size:13px;padding:8px 12px;outline:none}#search:focus{border-color:var(--acc)}.fg{display:flex;flex-direction:column;gap:3px}.fp{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--mut);border:1px solid transparent}.fp:hover{background:#2e2e3e;color:var(--txt)}.fp.act{background:#26221a;border-color:var(--acc);color:var(--acc)}.fc2{font-size:11px;color:var(--mut);background:var(--sur2);border-radius:8px;padding:1px 6px}main{flex:1;padding:24px 28px}.gh{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}.gt{font-family:'Cinzel',serif;font-size:17px;font-weight:400}.gc{font-size:13px;color:var(--mut)}.af{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}.chip{display:flex;align-items:center;gap:5px;background:#26221a;border:1px solid var(--acc);color:var(--acc);font-size:12px;padding:3px 9px;border-radius:16px;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--cw),1fr));gap:16px}.ci{background:var(--sur);border:1px solid var(--bor);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:transform .2s,border-color .2s}.ci:hover{transform:translateY(-2px);border-color:#4a4a55}.ci.il{border-color:var(--acc)}.iw{position:relative;aspect-ratio:5/7;background:var(--sur2);overflow:hidden}.iw img{width:100%;height:100%;object-fit:cover;display:block}.ph2{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px}.ilb{position:absolute;top:6px;right:6px;background:var(--acc);color:#0e0e10;font-size:10px;padding:2px 7px;border-radius:12px;opacity:0}.ci.il .ilb{opacity:1}.info{padding:9px 11px 11px;flex:1;display:flex;flex-direction:column;gap:5px}.cn{font-size:13px;font-weight:500}.cs{font-size:11px;color:var(--mut)}.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px}.tag{font-size:10px;background:#252530;color:var(--mut);padding:2px 6px;border-radius:3px}.tag.g{background:#1a2030;color:#6a9fd8}.tag.s{background:#1e2a1a;color:#7aba6a}.code2{font-size:10px;color:var(--mut);font-family:monospace;margin-top:auto;padding-top:3px}.ab{margin:0 11px 11px;padding:7px;border-radius:6px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:12px;cursor:pointer;text-align:center}.ab:hover{background:#26221a;border-color:var(--acc);color:var(--acc)}.ci.il .ab{background:#26221a;border-color:var(--acc);color:var(--acc)}.nr{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--mut)}.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}.ov.open{display:block}.dr{position:fixed;top:0;right:-420px;width:400px;max-width:100vw;height:100vh;background:var(--sur);border-left:1px solid var(--bor);z-index:201;display:flex;flex-direction:column;transition:right .3s;padding:24px 20px;gap:16px}.dr.open{right:0}.dh{display:flex;align-items:center;justify-content:space-between}.dt{font-family:'Cinzel',serif;font-size:16px;color:var(--acc)}.xb{background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer}.li2{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}.le{display:flex;align-items:center;gap:10px;background:var(--sur2);border:1px solid var(--bor);border-radius:6px;padding:9px 11px}.lei{flex:1;min-width:0}.len{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lec{font-size:11px;color:var(--mut);font-family:monospace}.lr{background:none;border:none;color:var(--mut);font-size:15px;cursor:pointer}.lr:hover{color:#e05555}.cow{display:flex;flex-direction:column;gap:8px}.col{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.07em}.co{background:#0a0a0c;border:1px solid var(--bor);border-radius:6px;padding:12px;font-family:monospace;font-size:12px;color:var(--acc2);max-height:140px;overflow-y:auto;white-space:pre}.cpb{padding:12px;border-radius:8px;border:1px solid var(--acc);background:#26221a;color:var(--acc);font-size:14px;cursor:pointer;text-align:center;width:100%}.cpb:hover{background:var(--acc);color:#0e0e10}.cpb:disabled{opacity:.4}.dh2{font-size:11px;color:var(--mut);text-align:center}.dh2 strong{color:#7289da}.emp{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--mut);font-size:14px;text-align:center}@media(max-width:680px){aside{display:none}main{padding:16px}:root{--cw:150px}.dr{width:100vw}}</style></head><body><header><div class="logo">Tap 4 <span>Proxies</span></div><button id="bb" onclick="openD()"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>My List <span class="bc" id="bc">0</span></button></header><div class="layout"><aside><div class="ss"><div class="sl">Search</div><input type="text" id="search" placeholder="Card name..." oninput="applyF()"></div><div class="ss"><div class="sl">Category</div><div class="fg" id="sf"></div></div><div class="ss"><div class="sl">Theme</div><div class="fg" id="cf"></div></div></aside><main><div class="gh"><div class="gt" id="gt">All Cards</div><div class="gc" id="gc"></div></div><div class="af" id="af"></div><div class="grid" id="grid"></div></main></div><div class="ov" id="ov" onclick="closeD()"></div><div class="dr" id="dr"><div class="dh"><div class="dt">My Order List</div><button class="xb" onclick="closeD()">x</button></div><div class="li2" id="li"></div><div class="cow"><div class="col">Paste into Discord</div><div class="co" id="co">(none)</div><button class="cpb" id="cpb" onclick="cpList()" disabled>Copy Order List</button><div class="dh2">Paste into <strong>#orders</strong> on Discord</div></div></div><script>var CARDS=[];var ml=[],aS=null,aC=null;function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}function bf(){var sec=[...new Set(CARDS.map(function(c){return c.section}))].sort();var ch=[...new Set(CARDS.reduce(function(a,c){return a.concat(c.chars)},[]))].sort();mk('sf',sec,function(){return aS},function(v){aS=v},false);mk('cf',ch,function(){return aC},function(v){aC=v},true)}function mk(id,items,gA,sA,iC){var el=document.getElementById(id);if(!el)return;el.innerHTML='';if(!items.length){el.innerHTML='<div style="font-size:12px;color:var(--mut);padding:4px 0">None yet</div>';return}items.forEach(function(item){var cnt=CARDS.filter(function(c){return iC?c.chars.indexOf(item)>=0:c.section===item}).length;var p=document.createElement('div');p.className='fp'+(gA()===item?' act':'');p.innerHTML='<span>'+(iC?'#'+item:cap(item))+'</span><span class="fc2">'+cnt+'</span>';p.onclick=function(){sA(gA()===item?null:item);bf();applyF()};el.appendChild(p)})}function tryImg(img,b){var u=b.toUpperCase();var tries=['/images/'+u+'.PNG','/images/'+u+'.JPG','/images/'+b+'.png','/images/'+b+'.jpg'];var cur=img.src;var idx=tries.findIndex(function(t){return cur.endsWith(t)});var nxt=tries[idx+1];if(nxt){img.src=nxt}else{img.style.display='none';img.nextElementSibling.style.display='flex'}}function applyF(){var q=document.getElementById('search').value.trim().toLowerCase();var f=CARDS.filter(function(c){if(aS&&c.section!==aS)return false;if(aC&&c.chars.indexOf(aC)<0)return false;if(q){var h=[c.name,c.art,c.section].concat(c.chars).concat([c.code]).join(' ').toLowerCase();if(h.indexOf(q)<0)return false}return true});document.getElementById('gt').textContent=aS?cap(aS)+' Cards':'All Cards';document.getElementById('gc').textContent=f.length+' card'+(f.length!==1?'s':'');var af=document.getElementById('af');af.innerHTML='';function chip(l,cl){var c=document.createElement('div');c.className='chip';c.textContent=l+' x';c.onclick=function(){cl();bf();applyF()};af.appendChild(c)}if(aS)chip(cap(aS),function(){aS=null});if(aC)chip('#'+aC,function(){aC=null});if(q)chip('"'+q+'"',function(){document.getElementById('search').value=''});var g=document.getElementById('grid');g.innerHTML='';if(!CARDS.length){g.innerHTML='<div class="nr"><h3>No cards yet</h3><p>Use the admin panel to add cards</p></div>';return}if(!f.length){g.innerHTML='<div class="nr"><h3>No results</h3><p>Try different filters</p></div>';return}f.forEach(function(card){var il=ml.indexOf(card.id)>=0;var el=document.createElement('div');el.className='ci'+(il?' il':'');el.id='ci-'+card.id;var b=card.code.toLowerCase();var src=card.image||'/images/'+card.code+'.PNG';el.innerHTML='<div class="iw"><img src="'+src+'" alt="'+card.art+'" loading="lazy" onerror="tryImg(this,''+b+'')"><div class="ph2" style="display:none">&#x1F0CF;</div><span class="ilb">In List</span></div><div class="info"><div class="cn">'+card.name+'</div><div class="cs">Art: '+card.art+'</div><div class="tags"><span class="tag g">MTG</span><span class="tag s">'+cap(card.section)+'</span>'+card.chars.slice(0,2).map(function(c){return'<span class="tag">#'+c+'</span>'}).join('')+'</div><div class="code2">'+card.code+'</div></div><button class="ab" onclick="tl(''+card.id+'',event)">'+(il?'In Your List':'+ Add to List')+'</button>';g.appendChild(el)})}function tl(id,e){e.stopPropagation();ml=ml.indexOf(id)>=0?ml.filter(function(x){return x!==id}):ml.concat([id]);document.getElementById('bc').textContent=ml.length;applyF();rdraw()}function rl(id){ml=ml.filter(function(x){return x!==id});document.getElementById('bc').textContent=ml.length;applyF();rdraw()}function openD(){rdraw();document.getElementById('ov').classList.add('open');document.getElementById('dr').classList.add('open')}function closeD(){document.getElementById('ov').classList.remove('open');document.getElementById('dr').classList.remove('open')}function rdraw(){var li=document.getElementById('li'),co=document.getElementById('co'),cpb=document.getElementById('cpb');if(!ml.length){li.innerHTML='<div class="emp"><div style="font-size:32px;opacity:.4">&#x1F0CF;</div><div>Add cards to your list</div></div>';co.textContent='(none)';cpb.disabled=true;return}cpb.disabled=false;li.innerHTML='';var lines=[];ml.forEach(function(id){var card=CARDS.find(function(c){return c.id===id});if(!card)return;lines.push(card.code);var e=document.createElement('div');e.className='le';e.innerHTML='<div class="lei"><div class="len">'+card.name+' - '+card.art+'</div><div class="lec">'+card.code+'</div></div><button class="lr" onclick="rl(''+card.id+'')">x</button>';li.appendChild(e)});co.textContent=lines.join('
')}function cpList(){var lines=ml.map(function(id){var c=CARDS.find(function(x){return x.id===id});return c?c.code:null}).filter(Boolean).join('
');navigator.clipboard.writeText(lines).then(function(){var b=document.getElementById('cpb');b.textContent='Copied!';setTimeout(function(){b.textContent='Copy Order List'},2000)})}bf();applyF();</script></body></html>
